body:
  text: 觚不觚録小説家𩔖一雜事之屬提要臣等謹案觚不觚録一卷明王世貞撰世貞有鳯洲綱鑑已著録是書專記明代典章制度於沿革為尤詳自序謂傷觚之不復舊觚盖感一代風氣之升降也雖多紀細故頗涉瑣屑而朝野軼聞往往可資考據昔徐學謨博物典彚載髙拱考察科道被劾者二十七人並載名氏説者謂其諳於故事而是書并詳及諸人所以被劾之故為學謨所不及載於情事首尾尤為完具盖世貞弱冠入仕晚成是書閲歴既深見聞皆確非他人之稗販耳食者可比故所叙録有足備史家甄擇者焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4bbb1a074b88d6be49d44e2c34d8b2b419af973613d254af1d9e3dde9077ce04
